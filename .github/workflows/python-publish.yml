# Dual-publish workflow.
#
# When a GitHub Release is published (or release-on-tag.yml dispatches the
# `release-on-tag-succeeded` event), this workflow builds, signs, and uploads
# BOTH distributions in lockstep:
#   - aiomtec2mqtt              (source: ./)
#   - aiomtec2mqtt-test-support (source: ./test_support)
#
# Each package gets:
#   - a build job (wheel + sdist + CycloneDX SBOM, attached to the Release)
#   - a Trusted-Publishing upload to PyPI (no API tokens)
#   - a Sigstore keyless signing job (bundles attached to the Release)
#
# Prereqs:
# - Trusted Publishing is configured on PyPI for *both* projects, pointing at
#   this workflow file (.github/workflows/python-publish.yml) and the
#   environment named `pypi`.
# - Versions are kept in lockstep by Release-Please (see release-please-config.json).

name: Upload Python Package to PyPI

# yamllint disable-line rule:truthy
on:
  release:
    types: [published]
  repository_dispatch:
    types: [release-on-tag-succeeded]

permissions:
  contents: write # required to create tags/releases and upload assets
  id-token: write # required for PyPI Trusted Publishing

concurrency:
  group: python-publish-${{ github.event.release.tag_name || github.event.client_payload.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ==========================================================
  # 1) BUILD JOB (matrix: one entry per distribution)
  #    - Builds wheel + sdist for the matrix package.
  #    - Generates a CycloneDX SBOM and attaches it to the Release.
  # ==========================================================
  release-build:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: aiomtec2mqtt
            source_dir: .
            artifact: release-dists-aiomtec2mqtt
            sbom_artifact: release-sbom-aiomtec2mqtt
          - package: aiomtec2mqtt-test-support
            source_dir: test_support
            artifact: release-dists-aiomtec2mqtt-test-support
            sbom_artifact: release-sbom-aiomtec2mqtt-test-support
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.client_payload.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools wheel cyclonedx-bom

      - name: Build distributions (wheel + sdist) for ${{ matrix.package }}
        working-directory: ${{ matrix.source_dir }}
        run: |
          python -m build
          ls -lh dist/

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.source_dir }}/dist/
          retention-days: 7

      - name: Build isolated environment with the wheel for SBOM
        working-directory: ${{ matrix.source_dir }}
        run: |
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --upgrade pip
          /tmp/sbom-venv/bin/pip install dist/*.whl

      - name: Generate CycloneDX SBOM (JSON + XML)
        working-directory: ${{ matrix.source_dir }}
        run: |
          set -euo pipefail
          mkdir -p sbom
          VERSION="${TAG_NAME#v}"
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --schema-version 1.5 \
            --output-format JSON \
            --outfile "sbom/${{ matrix.package }}-${VERSION}.cdx.json" \
            /tmp/sbom-venv
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --schema-version 1.5 \
            --output-format XML \
            --outfile "sbom/${{ matrix.package }}-${VERSION}.cdx.xml" \
            /tmp/sbom-venv
          ls -lh sbom/

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sbom_artifact }}
          path: ${{ matrix.source_dir }}/sbom/
          retention-days: 90

      - name: Attach SBOM to GitHub Release
        if: env.TAG_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ matrix.source_dir }}
        run: |
          set -euo pipefail
          gh release upload "${TAG_NAME}" \
            sbom/*.cdx.json \
            sbom/*.cdx.xml \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # ==========================================================
  # 2) PYPI PUBLISH JOB (matrix: one upload per distribution)
  # ==========================================================
  pypi-publish:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    needs: [release-build]
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: aiomtec2mqtt
            artifact: release-dists-aiomtec2mqtt
            url: https://pypi.org/p/aiomtec2mqtt
          - package: aiomtec2mqtt-test-support
            artifact: release-dists-aiomtec2mqtt-test-support
            url: https://pypi.org/p/aiomtec2mqtt-test-support
    environment:
      name: pypi
      url: ${{ matrix.url }}
    steps:
      - name: Download built distributions for ${{ matrix.package }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: List files to be published
        run: |
          echo "Publishing the following files to PyPI:"
          ls -lh dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          print-hash: true

  # ==========================================================
  # 3) SIGSTORE SIGNING JOB (matrix: bundles per distribution)
  # ==========================================================
  sigstore-sign:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    needs: [release-build]
    permissions:
      id-token: write # required for keyless OIDC signing
      contents: write # required to upload bundles to the Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: aiomtec2mqtt
            artifact: release-dists-aiomtec2mqtt
          - package: aiomtec2mqtt-test-support
            artifact: release-dists-aiomtec2mqtt-test-support
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.client_payload.tag }}
    steps:
      - name: Download built distributions for ${{ matrix.package }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.1
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          upload-signing-artifacts: true
          release-signing-artifacts: false # we attach explicitly below for clobber-control

      - name: Attach Sigstore bundles to GitHub Release
        if: env.TAG_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${TAG_NAME}" \
            dist/*.sigstore.json \
            --repo "${GITHUB_REPOSITORY}" --clobber
