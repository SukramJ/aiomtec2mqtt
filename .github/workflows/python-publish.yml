# Publish workflow for aiomtec2mqtt.
#
# When a GitHub Release is published (or release-on-tag.yml dispatches the
# `release-on-tag-succeeded` event), this workflow builds, signs, and uploads
# the aiomtec2mqtt distribution:
#   - build job (wheel + sdist + CycloneDX SBOM, attached to the Release)
#   - Trusted-Publishing upload to PyPI (no API tokens)
#   - Sigstore keyless signing job (bundles attached to the Release)
#
# The companion package `aiomtec2mqtt-test-support` is NOT published from this
# workflow. If/when it needs publishing, add a separate workflow rather than
# coupling it to the main package's release lockstep.
#
# Prereqs:
# - Trusted Publishing is configured on PyPI for `aiomtec2mqtt`, pointing at
#   this workflow file (.github/workflows/python-publish.yml) and the
#   environment named `pypi`.

name: Upload Python Package to PyPI

# yamllint disable-line rule:truthy
on:
  release:
    types: [published]
  repository_dispatch:
    types: [release-on-tag-succeeded]

permissions:
  contents: write # required to create tags/releases and upload assets
  id-token: write # required for PyPI Trusted Publishing

concurrency:
  group: python-publish-${{ github.event.release.tag_name || github.event.client_payload.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ==========================================================
  # 1) BUILD JOB
  #    - Builds wheel + sdist for aiomtec2mqtt.
  #    - Generates a CycloneDX SBOM and attaches it to the Release.
  # ==========================================================
  release-build:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.client_payload.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools wheel cyclonedx-bom

      - name: Build distributions (wheel + sdist)
        run: |
          python -m build
          ls -lh dist/

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists-aiomtec2mqtt
          path: dist/
          retention-days: 7

      - name: Build isolated environment with the wheel for SBOM
        run: |
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --upgrade pip
          /tmp/sbom-venv/bin/pip install dist/*.whl

      - name: Generate CycloneDX SBOM (JSON + XML)
        run: |
          set -euo pipefail
          mkdir -p sbom
          VERSION="${TAG_NAME#v}"
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --sv 1.5 \
            --output-format JSON \
            --output-file "sbom/aiomtec2mqtt-${VERSION}.cdx.json" \
            /tmp/sbom-venv
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --sv 1.5 \
            --output-format XML \
            --output-file "sbom/aiomtec2mqtt-${VERSION}.cdx.xml" \
            /tmp/sbom-venv
          ls -lh sbom/

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-sbom-aiomtec2mqtt
          path: sbom/
          retention-days: 90

      - name: Attach SBOM to GitHub Release
        if: env.TAG_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${TAG_NAME}" \
            sbom/*.cdx.json \
            sbom/*.cdx.xml \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # ==========================================================
  # 2) PYPI PUBLISH JOB
  # ==========================================================
  pypi-publish:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    needs: [release-build]
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/aiomtec2mqtt
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists-aiomtec2mqtt
          path: dist/

      - name: List files to be published
        run: |
          echo "Publishing the following files to PyPI:"
          ls -lh dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          print-hash: true

  # ==========================================================
  # 3) SIGSTORE SIGNING JOB
  # ==========================================================
  sigstore-sign:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    needs: [release-build]
    permissions:
      id-token: write # required for keyless OIDC signing
      contents: write # required to upload bundles to the Release
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.client_payload.tag }}
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists-aiomtec2mqtt
          path: dist/

      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          upload-signing-artifacts: true
          release-signing-artifacts: false # we attach explicitly below for clobber-control

      - name: Attach Sigstore bundles to GitHub Release
        if: env.TAG_NAME != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${TAG_NAME}" \
            dist/*.sigstore.json \
            --repo "${GITHUB_REPOSITORY}" --clobber
