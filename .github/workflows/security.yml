name: "Security"

# yamllint disable-line rule:truthy
on:
  pull_request: ~
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install bandit
        run: python -m pip install --upgrade pip bandit
      - name: Run bandit
        run: |
          bandit -r aiomtec2mqtt script tests \
            -c tests/bandit.yaml \
            --quiet

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit
        run: pip-audit --strict --requirement requirements.txt
        continue-on-error: true
