name-template: "v$RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "🧹 Maintenance"
    labels:
      - "chore"
      - "refactor"
      - "ci"
      - "build"
  - title: "📚 Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "⬆️ Dependencies"
    labels:
      - "dependencies"
    collapse-after: 5

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "breaking"
      - "major"
  minor:
    labels:
      - "feature"
      - "enhancement"
      - "minor"
  patch:
    labels:
      - "fix"
      - "bug"
      - "chore"
      - "docs"
      - "dependencies"
      - "security"
  default: patch

autolabeler:
  - label: "fix"
    title:
      - '/^fix(\(.+\))?:/i'
  - label: "feature"
    title:
      - '/^feat(\(.+\))?:/i'
  - label: "chore"
    title:
      - '/^chore(\(.+\))?:/i'
  - label: "docs"
    title:
      - '/^docs(\(.+\))?:/i'
  - label: "refactor"
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: "dependencies"
    branch:
      - '/^dependabot\//'

template: |
  ## Changes in $RESOLVED_VERSION

  $CHANGES

  **Full Changelog**: https://github.com/SukramJ/aiomtec2mqtt/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
