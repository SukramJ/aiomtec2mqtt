repos:
  - repo: local
    hooks:
      # Stdlib-only helper; uses the shebang (`#!/usr/bin/env python3`) so it
      # runs without an activated project venv.
      - id: sort-class-members
        name: sort-class-members
        entry: script/sort_class_members.py
        language: script
        types_or: [python]
        files: ^(aiomtec2mqtt|tests)/.+\.py$
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
        files: ^((aiomtec2mqtt|pylint|script|tests)/.+)?[^/]+\.py$
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=hass
          - --skip="./.*,*.csv,*.json"
          - --quiet-level=2
        exclude_types: [csv, json]
        exclude: ^tests/fixtures/|templates/customize.yaml|^(BASELINE|PHASE0_SUMMARY)\.md$
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          - --quiet
          - --format=custom
          - --configfile=tests/bandit.yaml
        files: ^(aiomtec2mqtt|script|tests)/.+\.py$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-executables-have-shebangs
        stages: [manual]
      - id: check-json
        exclude: (.vscode|.devcontainer)
      - id: no-commit-to-branch
        args:
          - --branch=devel
          - --branch=master
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
  - repo: https://github.com/cdce8p/python-typing-update
    rev: v0.5.1
    hooks:
      # Run `python-typing-update` hook manually from time to time
      # to update python typing syntax.
      # Will require manual work, before submitting changes!
      # pre-commit run --hook-stage manual python-typing-update --all-files
      - id: python-typing-update
        stages: [manual]
        args:
          - --py313-plus
          - --force
          - --keep-updates
        files: ^(aiomtec2mqtt|tests|script)/.+\.py$
  - repo: local
    hooks:
      # mypy/pylint need access to all project imports (Pydantic, pymodbus,
      # etc.), so they must run inside the project venv. The wrapper
      # activates `.venv/` (or `venv/`) before exec'ing the tool, which
      # works whether prek itself is invoked from an activated shell or
      # from a Git pre-commit hook.
      - id: mypy
        name: mypy
        entry: script/run-in-env.sh mypy
        language: script
        types: [python]
        require_serial: true
        files: ^(aiomtec2mqtt|pylint)/.+\.py$
      - id: pylint
        name: pylint
        entry: script/run-in-env.sh pylint -j 0
        language: script
        types: [python]
        files: ^(aiomtec2mqtt)/.+\.py$
      # Stdlib-only helper; uses the shebang so it runs without an
      # activated project venv (unlike mypy/pylint above).
      - id: kwonly-lint
        name: kwonly-lint
        entry: script/lint_kwonly.py aiomtec2mqtt
        language: script
        types_or: [python, pyi]
        files: ^(aiomtec2mqtt)/.+\.py$
